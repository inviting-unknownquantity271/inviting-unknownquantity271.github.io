name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          ABC21C: ${{ secrets.ABC21C }}
          B8D85E: ${{ secrets.B8D85E }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('ABC21C', '')
          k2 = os.environ.get('B8D85E', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- 0c5ea8760bae96bb7fe29367166ceba9f5379d8068f8 -->', k1) if k1 else txt
          out = out.replace('<!-- f90a2411937c6098df1127ce99ea -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
